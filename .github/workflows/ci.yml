name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Check Python syntax
        run: python -m compileall -q -x '(^|/)(vendor|\.venv)(/|$)' .

      - name: Run unit tests
        run: pytest tests/ -q

      - name: Fetch platform-tagged vendor wheels
        run: python fetch_vendor.py

      - name: Validate package contents
        run: python package.py --check
